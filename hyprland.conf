#######################################################################################
# MERGED HYPRLAND CONFIG (User Preferences + v0.52 Fixes)
#######################################################################################

################
### MONITORS ###
################
# Choice 1: Old (High Refresh Rate)
monitor=eDP-1,1920x1080@144,auto,1

###################
### MY PROGRAMS ###
###################
$terminal = nixGLMesa ghostty
# Choice 2: Old (Thunar)
$fileManager = thunar
$menu = wofi --show drun

#################
### ENV VARS  ###
#################
# Moved to top for better stability in v0.52
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = MOZ_ENABLE_WAYLAND,1

#################
### AUTOSTART ###
#################
# Choice 9: Old (Your full suite of tools)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/libexec/xdg-desktop-portal -r
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar & hyprpaper
exec-once = swaync
exec-once = clipse -listen
exec-once = blueman-applet
exec-once = nm-applet
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
exec-once = mount /dev/nvme0n1p5 /media/Arch-home
exec-once = mount /dev/nvme0n1p1 /media/Shared-partition

exec-once = pipewire
exec-once = wireplumber
exec-once = pipewire-pulse
exec-once = udiskie

# Note: Ensure hyprv_util exists or remove this line if you aren't using HyprV anymore
exec = ~/.config/HyprV/hyprv_util setbg 

#####################
### LOOK AND FEEL ###
#####################
general {
    # Choice 3: Old (Tighter gaps)
    gaps_in = 3
    gaps_out = 7
    border_size = 2
    
    col.active_border = rgb(cdd6f4)
    col.inactive_border = rgba(595959aa)
    
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 5 # Choice 3: Old
    
    active_opacity = 1.0
    inactive_opacity = 1.0

    # Choice 4: Old (Performance mode - Shadows/Blur Disabled)
    shadow {
        enabled = false 
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = false
        size = 7
        passes = 1
        new_optimizations = true
        vibrancy = 0.1696
        xray = true
    }
}

# Fix: Replaces old 'blurls' command
layerrule = blur, lockscreen
layerrule = blur, waybar
layerrule = ignorezero, waybar

animations {
    enabled = true # Fix: Strict parser (removed "please :)")

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    vfr = true # Kept from old (Good for battery)
    vrr = 1
    disable_splash_rendering = true
    force_default_wallpaper = 2
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    
    # Choice 5: Old (Left-handed, High Sensitivity)
    follow_mouse = 1
    left_handed = true
    sensitivity = 0.3

    touchpad {
        natural_scroll = true
        scroll_factor = 2
        tap_and_drag = true # Fix: syntax update
    }
}

gestures {
    workspace_swipe = true
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

####################
### WINDOW RULES ###
####################
# Standard Hygiene
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Choice 10: Old (Custom Opacity & Floats)
windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
windowrulev2 = opacity 0.8 0.8,class:^(kitty)$
windowrulev2 = opacity 0.8 0.8,class:^(ghostty)$
windowrulev2 = animation popin,class:^(kitty)$,title:^(update-sys)$
windowrulev2 = animation popin,class:^(thunar)$
windowrulev2 = opacity 0.8 0.8,class:^(thunar)$
windowrulev2 = opacity 0.8 0.8,class:^(VSCodium)$
windowrulev2 = animation popin,class:^(chromium)$
windowrulev2 = move cursor -3% -105%,class:^(wofi)$
windowrulev2 = noanim,class:^(wofi)$
windowrulev2 = opacity 0.8 0.6,class:^(wofi)$


###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
# Choice 6: Old (F4 to kill)
bind = $mainMod, F4, killactive
# Choice 8: New (Exit Hyprland immediately)
bind = $mainMod, M, exit 

bind = $mainMod, L, exec, swaylock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating
# Choice 7: Old (Space for menu)
bind = $mainMod, space, exec, $menu 

bind = $mainMod, P, pseudo # dwindle
bind = $mainMod, J, togglesplit # dwindle
bind = $mainMod, F, fullscreen
bind = $mainMod, T, exec, ~/.config/HyprV/hyprv_util vswitch

# Utilities
bind = $mainMod, PRINT, exec, wayshot -s "$(slurp)"
bind = $mainMod, SEMICOLON, exec, emote
bind = ALT, V, exec, $terminal --class clipse -e 'clipse'

# Special Workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch Workspaces
bind = $mainMod SHIFT, 1, workspace, 1
bind = $mainMod SHIFT, 2, workspace, 2
bind = $mainMod SHIFT, 3, workspace, 3
bind = $mainMod SHIFT, 4, workspace, 4
bind = $mainMod SHIFT, 5, workspace, 5
bind = $mainMod SHIFT, 6, workspace, 6
bind = $mainMod SHIFT, 7, workspace, 7
bind = $mainMod SHIFT, 8, workspace, 8
bind = $mainMod SHIFT, 9, workspace, 9
bind = $mainMod SHIFT, 0, workspace, 10

# Move to Workspace
bind = $mainMod, 1, movetoworkspace, 1
bind = $mainMod, 2, movetoworkspace, 2
bind = $mainMod, 3, movetoworkspace, 3
bind = $mainMod, 4, movetoworkspace, 4
bind = $mainMod, 5, movetoworkspace, 5
bind = $mainMod, 6, movetoworkspace, 6
bind = $mainMod, 7, movetoworkspace, 7
bind = $mainMod, 8, movetoworkspace, 8
bind = $mainMod, 9, movetoworkspace, 9
bind = $mainMod, 0, movetoworkspace, 10

# Mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio / Brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 1%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 1%-
bindl = , XF86AudioPlay, exec, playerctl play-pause
